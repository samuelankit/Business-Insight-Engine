          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Drafted intro message
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    type: string
                required: [draft]

  /networking/connections/{connectionId}/approve-send:
    post:
      operationId: approveSendIntro
      tags: [networking]
      summary: Human approves Rigo-drafted intro and marks it sent (Rigo mode)
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Intro approved and sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  draft:
                    type: ["string", "null"]
                  sentTo:
                    type: string
                  aiDisclosure:
                    type: string
                required: [success, message, sentTo, aiDisclosure]

  /networking/my-network:
    get:
      operationId: getMyNetwork
      tags: [networking]
      summary: Get all accepted connections
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: My network connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkConnection"

  /networking/followups:
    get:
      operationId: getNetworkFollowups
      tags: [networking]
      summary: Get all followups for the user
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of followups
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    connectionId:
                      type: string
                    promptText:
                      type: string
                    scheduledAt:
                      type: string
                    completedAt:
                      type: ["string", "null"]
                    isDraft:
                      type: boolean
                    hasDraftContent:
                      type: boolean
                  required: [id, connectionId, promptText, scheduledAt, isDraft, hasDraftContent]

  /networking/process-followups:
    post:
      operationId: processNetworkFollowups
      tags: [networking]
      summary: Process due followups and send outreach to counterparts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                businessId:
                  type: string
              required: [businessId]
      responses:
        "200":
          description: Followup processing result
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                  total:
                    type: integer
                required: [processed, total]

  /networking/network-summary:
    get:
      operationId: getNetworkSummary
      tags: [networking]
      summary: Get summary for Dashboard Rigo awareness
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Network summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string
                    nullable: true

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: ["string", "null"]
      required: [success]

    # ── Business ──
    Business:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sector:
          type: ["string", "null"]
        country:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, country, isActive, createdAt]

    CreateBusinessRequest:
      type: object
      properties:
        name:
          type: string
        sector:
          type: ["string", "null"]
        country:
          type: string
        isActive:
          type: ["boolean", "null"]
      required: [name, country]

    UpdateBusinessRequest:
      type: object
      properties:
        name:
          type: ["string", "null"]
        sector:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    BusinessInsights:
      type: object
      properties:
        sector:
          type: string
        recommendations:
          type: array
          items:
            type: string
        automationOpportunities:
          type: array
          items:
            type: string
      required: [sector, recommendations, automationOpportunities]

    # ── API Keys ──
    ApiKey:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        maskedKey:
          type: string
        createdAt:
          type: string
      required: [id, provider, maskedKey, createdAt]

    SaveKeyRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [openai, anthropic, elevenlabs]
        key:
          type: string
      required: [provider, key]

    # ── Voice ──
    TtsRequest:
      type: object
      properties:
        text:
          type: string
        provider:
          type: ["string", "null"]
        voiceName:
          type: ["string", "null"]
        speechRate:
          type: ["number", "null"]
      required: [text]

    VoicePreferences:
      type: object
      properties:
        provider:
          type: string
          enum: [google, elevenlabs]
        voiceName:
          type: ["string", "null"]
        speechRate:
          type: ["number", "null"]
      required: [provider]

    TranscribeResponse:
      type: object
      properties:
        transcript:
          type: string
        confidence:
          type: ["number", "null"]
      required: [transcript]

    # ── Orchestrate ──
    OrchestrateRequest:
      type: object
      properties:
        message:
          type: string
        businessId:
          type: string
        sessionMode:
          type: ["string", "null"]
          enum: [deep_research, strategy_swot, brainstorm, business_plan, "null"]
        provider:
          type: ["string", "null"]
          enum: [openai, anthropic, "null"]
      required: [message, businessId]

    OrchestrateResponse:
      type: object
      properties:
        response:
          type: string
        sessionMode:
          type: ["string", "null"]
        sessionStep:
          type: ["integer", "null"]
        sessionTotalSteps:
          type: ["integer", "null"]
        toolsUsed:
          type: array
          items:
            type: string
        usage:
          type: ["integer", "null"]
      required: [response, toolsUsed]

    # ── Sessions ──
    SessionStatus:
      type: object
      properties:
        active:
          type: boolean
        sessionId:
          type: ["string", "null"]
        mode:
          type: ["string", "null"]
        step:
          type: ["integer", "null"]
        totalSteps:
          type: ["integer", "null"]
        stepLabel:
          type: ["string", "null"]
      required: [active]

    SessionSummary:
      type: object
      properties:
        id:
          type: string
        mode:
          type: string
        businessId:
          type: string
        completedAt:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
      required: [id, mode, businessId, status, createdAt]

    # ── Agents ──
    AgentTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
        systemPrompt:
          type: string
        suggestedTools:
          type: array
          items:
            type: string
      required: [id, name, description, type, systemPrompt, suggestedTools]

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
        isActive:
          type: boolean
        isBuiltIn:
          type: boolean
        businessId:
          type: string
        scheduleType:
          type: string
          enum: [none, hourly, daily, weekly, custom]
        scheduleTime:
          type: ["string", "null"]
        scheduleDay:
          type: ["integer", "null"]
        scheduleInterval:
          type: ["integer", "null"]
        nextRunAt:
          type: ["string", "null"]
        lastRunAt:
          type: ["string", "null"]
        toolAccess:
          type: array
          items:
            type: string
        createdAt:
          type: string
      required: [id, name, type, isActive, isBuiltIn, businessId, scheduleType, toolAccess, createdAt]

    CreateAgentRequest:
      type: object
      properties:
        businessId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        systemPrompt:
          type: string
        toolAccess:
          type: array
          items:
            type: string
      required: [businessId, name, systemPrompt, toolAccess]

    UpdateAgentRequest:
      type: object
      properties:
        name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        systemPrompt:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]
        scheduleType:
          type: ["string", "null"]
          enum: [none, hourly, daily, weekly, custom, "null"]
        scheduleTime:
          type: ["string", "null"]
        scheduleDay:
          type: ["integer", "null"]
        scheduleInterval:
          type: ["integer", "null"]
        toolAccess:
          type: ["array", "null"]
          items:
            type: string

    AgentLog:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        summary:
          type: string
        createdAt:
          type: string
      required: [id, agentId, summary, createdAt]

    AgentRunResult:
      type: object
      properties:
        summary:
          type: string
        actions:
          type: array
          items:
            type: string
        isPreview:
          type: boolean
      required: [summary, actions, isPreview]

    AgentApproval:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        actionType:
          type: string
        actionDescription:
          type: string
        toolName:
          type: string
        functionName:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, expired]
        expiresAt:
          type: string
        createdAt:
          type: string
      required: [id, agentId, actionType, actionDescription, toolName, functionName, status, expiresAt, createdAt]

    # ── Tools ──
    ToolInfo:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        credentialType:
          type: string
        isConnected:
          type: boolean
        connectionId:
          type: ["string", "null"]
        functions:
          type: array
          items:
            type: string
      required: [name, description, credentialType, isConnected, functions]

    ToolConnection:
      type: object
      properties:
        id:
          type: string
        toolName:
