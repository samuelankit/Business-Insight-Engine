openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GoRigo AI Business Operating System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: businesses
    description: Business management
  - name: keys
    description: API key management
  - name: voice
    description: Voice and TTS
  - name: agents
    description: AI agent management
  - name: orchestrate
    description: Voice command orchestration
  - name: tools
    description: Tool connections
  - name: usage
    description: Usage and billing
  - name: team
    description: Team management
  - name: contacts
    description: Contact management
  - name: campaigns
    description: Campaign management
  - name: notifications
    description: Push notifications
  - name: referrals
    description: Referral system
  - name: reports
    description: Reports and analytics
  - name: knowledge
    description: Knowledge base
  - name: sessions
    description: Guided sessions
  - name: admin
    description: Admin console
  - name: networking
    description: Business networking and matchmaking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ───── Businesses ─────
  /businesses:
    get:
      operationId: listBusinesses
      tags: [businesses]
      summary: List all businesses for the current user
      responses:
        "200":
          description: List of businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"
    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Create a new business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessRequest"
      responses:
        "201":
          description: Business created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /businesses/{id}:
    put:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessRequest"
      responses:
        "200":
          description: Business updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    delete:
      operationId: deleteBusiness
      tags: [businesses]
      summary: Delete a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /businesses/{id}/insights:
    get:
      operationId: getBusinessInsights
      tags: [businesses]
      summary: Get sector-specific automation insights
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessInsights"

  # ───── API Keys ─────
  /keys:
    get:
      operationId: listKeys
      tags: [keys]
      summary: List API keys (masked)
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      operationId: saveKey
      tags: [keys]
      summary: Save or update an API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveKeyRequest"
      responses:
        "200":
          description: Key saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"

  /keys/{id}:
    delete:
      operationId: deleteKey
      tags: [keys]
      summary: Delete an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ───── Voice ─────
  /tts:
    post:
      operationId: synthesizeSpeech
      tags: [voice]
      summary: Server-side TTS synthesis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TtsRequest"
      responses:
        "200":
          description: Audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary

  /voice-preferences:
    get:
      operationId: getVoicePreferences
      tags: [voice]
      summary: Get user voice preferences
      responses:
        "200":
          description: Voice preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoicePreferences"
    put:
      operationId: updateVoicePreferences
      tags: [voice]
      summary: Update user voice preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoicePreferences"
      responses:
        "200":
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoicePreferences"

  /transcribe:
    post:
      operationId: transcribeAudio
      tags: [voice]
      summary: Transcribe audio (usage-metered)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
                businessId:
                  type: string
      responses:
        "200":
          description: Transcription result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscribeResponse"

  # ───── Orchestrate ─────
  /orchestrate:
    post:
      operationId: orchestrate
      tags: [orchestrate]
      summary: Voice command orchestration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrchestrateRequest"
      responses:
        "200":
          description: Orchestration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestrateResponse"

  # ───── Sessions ─────
  /sessions/active:
    get:
      operationId: getActiveSession
      tags: [sessions]
      summary: Check for active guided session
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Active session or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatus"

  /sessions/exit:
    post:
      operationId: exitSession
      tags: [sessions]
      summary: Exit/cancel active guided session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                businessId:
                  type: string
              required: [businessId]
      responses:
        "200":
          description: Session exited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sessions/history:
    get:
      operationId: getSessionHistory
      tags: [sessions]
      summary: List all sessions for a business
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Session history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionSummary"

  # ───── Agents ─────
  /agents/templates:
    get:
      operationId: listAgentTemplates
      tags: [agents]
      summary: List predefined agent templates
      responses:
        "200":
          description: Agent templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentTemplate"

  /agents/approvals/pending:
    get:
      operationId: listPendingApprovals
      tags: [agents]
      summary: List pending agent approval requests
      parameters:
        - name: businessId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Pending approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentApproval"

  /agents/approvals/{actionId}/approve:
    post:
      operationId: approveAgentAction
      tags: [agents]
      summary: Approve and execute a pending agent action
      parameters:
        - name: actionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Action approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /agents/approvals/{actionId}/reject:
    post:
      operationId: rejectAgentAction
      tags: [agents]
      summary: Reject a pending agent action
      parameters:
        - name: actionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Action rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List agents for a business
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create a custom agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{agentId}:
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{agentId}/run:
    post:
      operationId: runAgent
      tags: [agents]
      summary: Run an AI agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                businessId:
                  type: string
              required: [businessId]
      responses:
        "200":
          description: Agent run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResult"

  /agents/{agentId}/test-run:
    post:
      operationId: testRunAgent
      tags: [agents]
      summary: Test run agent in preview mode
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                businessId:
                  type: string
              required: [businessId]
      responses:
        "200":
          description: Test run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResult"

  /agents/{agentId}/logs:
    get:
      operationId: getAgentLogs
      tags: [agents]
      summary: Get logs for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Agent logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentLog"

  # ───── Tools ─────
  /tools/available:
    get:
      operationId: listAvailableTools
      tags: [tools]
      summary: List all registered tools with connection status
      responses:
        "200":
          description: Available tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolInfo"

  /tools/connections:
    get:
      operationId: listToolConnections
      tags: [tools]
      summary: List user's connected tools
      responses:
        "200":
          description: Tool connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolConnection"
    post:
      operationId: connectTool
      tags: [tools]
      summary: Connect a tool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectToolRequest"
      responses:
        "201":
          description: Tool connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolConnection"

  /tools/connections/{id}:
    delete:
      operationId: disconnectTool
      tags: [tools]
      summary: Disconnect a tool
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ───── Usage & Billing ─────
  /usage/summary:
    get:
      operationId: getUsageSummary
      tags: [usage]
      summary: Current period usage summary
      responses:
        "200":
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummary"

  /usage/history:
    get:
      operationId: getUsageHistory
      tags: [usage]
      summary: Past periods usage history
      responses:
        "200":
          description: Usage history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsagePeriod"

  /usage/plans:
    get:
      operationId: listPlans
      tags: [usage]
      summary: List available subscription plans
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /usage/upgrade:
    post:
      operationId: upgradePlan
      tags: [usage]
      summary: Switch plan or create Stripe Checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradePlanRequest"
      responses:
        "200":
          description: Upgrade result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradePlanResponse"

  /usage/billing-portal:
    get:
      operationId: getBillingPortal
      tags: [usage]
      summary: Get Stripe Customer Portal URL
      responses:
        "200":
          description: Billing portal URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPortalResponse"

  /usage/wallet:
    get:
      operationId: getWallet
      tags: [usage]
      summary: Get wallet balance and recent transactions
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletInfo"

  /usage/wallet/topup:
    post:
      operationId: topUpWallet
      tags: [usage]
      summary: Top up wallet balance via Stripe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopUpRequest"
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopUpResponse"

  # ───── Team ─────
  /team/invite:
    post:
      operationId: createTeamInvite
      tags: [team]
      summary: Create a team invite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamInvite"

  /team/join:
    post:
      operationId: joinTeam
      tags: [team]
      summary: Join a team with an invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinTeamRequest"
      responses:
        "200":
          description: Joined team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/members:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List team members
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

  /team/members/{memberId}:
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Update member role
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [owner, manager, viewer]
              required: [role]
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: removeTeamMember
      tags: [team]
      summary: Remove a team member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /team/invites:
    get:
      operationId: listTeamInvites
      tags: [team]
      summary: List pending invites
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamInvite"

  /team/invites/{inviteId}:
    delete:
      operationId: revokeTeamInvite
      tags: [team]
      summary: Revoke a team invite
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /team/activity:
    get:
      operationId: getTeamActivity
      tags: [team]
      summary: Team activity feed
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Team activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamActivity"

  /team/role:
    get:
      operationId: getMyTeamRole
      tags: [team]
      summary: Get current user's role for a business
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: My role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamRoleResponse"

  # ───── Contacts ─────
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts for a business
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Contacts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactsListResponse"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a single contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/import:
    post:
      operationId: importContacts
      tags: [contacts]
      summary: Bulk import contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportContactsRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportContactsResponse"

  /contacts/{id}:
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contact deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ───── Contact Lists ─────
  /contact-lists:
    get:
      operationId: listContactLists
      tags: [contacts]
      summary: List contact lists
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contact lists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactList"
    post:
      operationId: createContactList
      tags: [contacts]
      summary: Create a contact list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactListRequest"
      responses:
        "201":
          description: Contact list created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactList"

  # ───── Campaigns ─────
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns for a business
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get campaign detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a draft campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignRequest"
